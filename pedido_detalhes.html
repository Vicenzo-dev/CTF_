<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Expedição - Contuflex</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --blue-contuflex: #003d5b;
            --success-green: #2ed573;
            --danger-red: #ff4757;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            color: #2d3436;
        }

        header { 
            width: 100%; 
            padding: 30px 0; 
            text-align: center; 
        }

        .logo-box {
            background: white; 
            display: inline-block; 
            padding: 15px 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .main-card { 
            background: white; 
            width: 90%; 
            max-width: 500px; 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            margin-bottom: 30px;
        }

        .info-row {
            margin-bottom: 18px;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 8px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #7f8c8d;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .valor {
            font-size: 16px;
            color: #2d3436;
            font-weight: 500;
        }

        .destaque-azul { color: var(--blue-contuflex); font-weight: bold; font-size: 20px; }
        .destaque-verde { color: var(--success-green); font-weight: bold; }
        .destaque-vermelho { color: var(--danger-red); font-weight: bold; }

        .btn-voltar {
            display: flex !important;     
            justify-content: center;       
            align-items: center;           
            text-align: center;
            width: 100%;
            box-sizing: border-box;        
            padding: 12px 0;               
            background: #003d5b;        
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        #loader { text-align: center; padding: 40px; }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--blue-contuflex);
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="LOGO-CONTUFLEX-e1756214639359.png" alt="Contuflex" width="180">
        </div>
        <h2 style="margin: 10px 0 5px 0; color: var(--blue-contuflex);">Detalhes da Expedição</h2>
        <small style="color: #636e72;">Consulta em Tempo Real - Sistema Totvs</small>
    </header>

<div class="main-card">
    <div id="loader">
        <div class="spinner"></div>
        <p>Buscando dados...</p>
    </div>

    <div id="conteudo" style="display: none;">
        
        <div class="info-row">
            <span class="label">NÚMERO DO PEDIDO</span>
            <span id="campo-pedido" class="valor destaque-azul" style="font-size: 1.4em;">---</span>
        </div>

        <div class="info-row">
            <span class="label">CLIENTE</span>
            <span id="campo-cliente" class="valor" style="font-size: 1.1em; font-weight: 500;">---</span>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <div style="display: flex; gap: 20px; margin-bottom: 15px;">
            <div class="info-row" style="flex: 1;">
                <span class="label">NOTA FISCAL</span>
                <span id="campo-nf" class="valor destaque-verde">---</span>
            </div>
            <div class="info-row" style="flex: 1;">
                <span class="label">EMISSÃO NF</span>
                <span id="campo-emissao-nf" class="valor">---</span>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
            <div class="info-row" style="flex: 1;">
                <span class="label">TRANSPORTADORA / TIPO</span>
                <span id="campo-transp-tipo" class="valor" style="font-weight: bold; color: #004085; display: block;">---</span>
                <div id="campo-transp-nome" style="font-size: 12px; color: #636e72; margin-top: 2px;">---</div>
            </div>

            <div class="info-row" id="row-protocolo" style="flex: 1;">
                <span class="label">PROTOCOLO DE COLETA</span>
                <div style="margin-top: 5px;">
                    <span id="campo-protocolo" class="valor destaque-azul" style="font-size: 14px; background: #f1f4f9; padding: 5px 10px; border-radius: 5px; display: inline-block; color: #004085; font-weight: bold; border: 1px solid #d1d9e6;">
                        ---
                    </span>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
            <div class="info-row" style="flex: 1;">
                <span class="label">STATUS DE COLETA</span>
                <span id="campo-data-col" class="valor" style="font-weight: bold;">---</span>
            </div>
            <div class="info-row" style="flex: 1;">
                <span class="label">VENDEDOR</span>
                <span id="campo-vendedor" class="valor">---</span>
            </div>
        </div>

        <a href="inicio.html" class="btn-voltar" style="text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 8px;">
            <span>🏠</span> Voltar ao Início
        </a>
    </div>
</div>

    <footer style="margin-bottom: 20px; color: #7f8c8d; font-size: 12px;">
        Desenvolvido por Vicenzo Henrique
    </footer>

    <script>
        function formatarDataSimples(dataStr) {
            if (!dataStr || dataStr === "-" || dataStr === "None") return "-";
            return dataStr.split(' ')[0].split('T')[0];
        }

        const params = new URLSearchParams(window.location.search);
        const idPedido = params.get('id');

        if (!idPedido) {
            document.getElementById('loader').innerHTML = "<b style='color:red'>Erro: Pedido não identificado.</b>";
        } else {
            fetch(`/pedido/detalhes_qr/${idPedido}`)
            .then(res => {
                if (!res.ok) throw new Error("Pedido não faturado ou inexistente");
                return res.json();
            })
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('conteudo').style.display = 'block';

                document.getElementById('campo-pedido').innerText = data.pedido;
                document.getElementById('campo-cliente').innerText = data.cliente;
                document.getElementById('campo-nf').innerText = data.nf;
                document.getElementById('campo-emissao-nf').innerText = formatarDataSimples(data.emissao_nf);
                document.getElementById('campo-transp-tipo').innerText = data.tipo_transp;
                document.getElementById('campo-transp-nome').innerText = data.nome_transp;
                document.getElementById('campo-vendedor').innerText = data.vendedor;
                document.getElementById('campo-protocolo').innerText = data.protocolo;
                
                
                const campoCol = document.getElementById('campo-data-col');
                const dataColLimpa = formatarDataSimples(data.data_col);
                campoCol.innerText = dataColLimpa === "-" ? "AGUARDANDO" : dataColLimpa;

                if (data.data_col === "AGUARDANDO" || !data.data_col || data.data_col === "-") {
                    campoCol.className = "valor destaque-vermelho";
                    campoCol.innerText = "AGUARDANDO";
                } else {
                    campoCol.className = "valor destaque-verde";
                }
            })
            .catch(err => {
                document.getElementById('loader').innerHTML = `<b style='color:red'>${err.message}</b><br><br>
                <a href="inicio.html" class="btn-voltar">Voltar</a>`;
            });
        }
    </script>
</body>
</html>
